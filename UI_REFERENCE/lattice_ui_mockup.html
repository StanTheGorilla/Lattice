<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Lattice — UI Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   LATTICE — design tokens
   ============================================================ */
:root {
  --bg-0:#0a0a0b;
  --bg-1:#111114;
  --bg-2:#17171c;
  --bg-inset:#0d0d10;
  --border:#24242b;
  --border-2:#1b1b21;
  --fg:#e8e8ed;
  --fg-mute:#9a9aa3;
  --fg-dim:#5e5e68;
  --fg-faint:#3a3a42;
  --accent:#5dd0c8;
  --accent-d:#3a8a85;
  --accent-12:rgba(93,208,200,0.12);
  --accent-20:rgba(93,208,200,0.20);
  --ok:#6dbf7a;
  --warn:#d4b15a;
  --bad:#c96a6a;
  --ok-12:rgba(109,191,122,0.14);
  --warn-12:rgba(212,177,90,0.14);
  --bad-12:rgba(201,106,106,0.14);

  --pad-1:4px; --pad-2:8px; --pad-3:12px; --pad-4:16px; --pad-5:24px; --pad-6:32px;
  --r-card:2px; --r-ctrl:3px;

  --font-sans:'Inter','Helvetica Neue',Arial,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
[data-theme="light"]{
  --bg-0:#f6f6f4; --bg-1:#ffffff; --bg-2:#eeeeec; --bg-inset:#f0f0ec;
  --border:#d8d8d4; --border-2:#e4e4df;
  --fg:#16161a; --fg-mute:#5a5a62; --fg-dim:#8a8a92; --fg-faint:#c4c4c0;
  --accent:#3a8a85; --accent-d:#5dd0c8;
  --accent-12:rgba(58,138,133,0.14); --accent-20:rgba(58,138,133,0.22);
}

/* ============================================================
   base
   ============================================================ */
*,*::before,*::after { box-sizing:border-box; }
html,body { margin:0; padding:0; height:100%; }
body {
  background:var(--bg-0);
  color:var(--fg);
  font-family:var(--font-sans);
  font-size:13px;
  line-height:1.45;
  font-feature-settings:'tnum' 1,'cv11' 1,'ss01' 1;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button { font:inherit; color:inherit; background:none; border:0; padding:0; cursor:pointer; }
input,select,textarea { font:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
::selection { background:var(--accent-20); color:var(--fg); }

/* scrollbar */
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#23232a; border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:#2e2e36; }

/* ============================================================
   typography utilities
   ============================================================ */
.mono { font-family:var(--font-mono); }
.tnum { font-variant-numeric:tabular-nums; }
.eyebrow {
  font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--fg-mute); font-weight:500;
}
.label { font-size:12px; color:var(--fg-mute); }
.muted { color:var(--fg-mute); }
.dim { color:var(--fg-dim); }
h1,h2,h3,h4 { font-weight:500; margin:0; letter-spacing:-0.01em; }
h1 { font-size:20px; }
h2 { font-size:16px; }
h3 { font-size:13px; }

/* ============================================================
   layout
   ============================================================ */
.app { display:grid; grid-template-columns:200px 1fr; min-height:100vh; }

aside.sidebar {
  border-right:1px solid var(--border);
  background:var(--bg-0);
  position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column;
  padding:14px 0 0;
}
.brand {
  display:flex; align-items:center; gap:8px;
  padding:0 16px 12px;
  font-family:var(--font-mono); font-weight:500;
  font-size:13px; letter-spacing:0.04em;
}
.brand-mark {
  width:14px; height:14px; position:relative;
}
.brand-mark::before, .brand-mark::after{
  content:""; position:absolute; inset:0;
  border:1px solid var(--accent);
}
.brand-mark::after{ transform:rotate(45deg) scale(0.7); }
.brand-name { color:var(--fg); }
.brand-tag { color:var(--fg-dim); margin-left:auto; font-size:11px; }

.sync-pill {
  margin:0 12px 14px;
  padding:7px 10px;
  border:1px solid var(--border); border-radius:2px;
  background:var(--bg-1);
  display:grid; grid-template-columns: 6px 1fr auto; gap:8px; align-items:center;
  font-size:11px; color:var(--fg-mute);
  cursor:pointer;
}
.sync-pill:hover { background:var(--bg-2); }
.sync-pill .body { display:flex; flex-direction:column; gap:1px; line-height:1.2; }
.sync-pill .body .l { color:var(--fg); }
.sync-pill .body .v { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-dim); }
.sync-pill .refresh { font-family:var(--font-mono); font-size:14px; color:var(--fg-dim); }
.sync-pill:hover .refresh { color:var(--fg); }

.nav { display:flex; flex-direction:column; padding:0 8px; gap:1px; }
.nav-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px 7px 12px; border-radius:2px;
  color:var(--fg-mute); font-size:13px;
  position:relative; cursor:pointer; user-select:none;
}
.nav-label { flex:1; }
.nav-item:hover { color:var(--fg); }
.nav-item:hover .nav-key { border-color:var(--border); color:var(--fg-dim); }
.nav-item.active { color:var(--fg); background:var(--bg-1); }
.nav-item.active::before {
  content:""; position:absolute; left:-8px; top:7px; bottom:7px;
  width:2px; background:var(--accent);
}
.nav-item.active .nav-key { color:var(--accent); border-color:var(--accent-d); }
.nav-key {
  font-family:var(--font-mono); font-size:10px;
  color:var(--fg-faint);
  border:1px solid var(--border-2);
  padding:1px 5px; border-radius:2px;
  letter-spacing:0;
  min-width:16px; text-align:center; line-height:1;
}
.nav-count {
  font-family:var(--font-mono); font-size:11px;
  color:var(--fg-dim);
}

.sidebar-section { padding:14px 12px 4px; }
.sidebar-section .eyebrow { font-size:9.5px; }
.sidebar-divider { height:1px; background:var(--border-2); margin:10px 12px; }
.sidebar-spacer { flex:1; min-height:8px; }

.user-row {
  margin:0; padding:10px 14px;
  display:flex; align-items:center; gap:10px;
  border-top:1px solid var(--border);
  font-size:12px;
}
.user-row .av {
  width:20px; height:20px; border:1px solid var(--border); border-radius:50%;
  display:grid; place-items:center; font-size:10px; font-family:var(--font-mono);
  color:var(--fg-mute);
}
.user-row .nm { color:var(--fg); }
.user-row .logout { margin-left:auto; color:var(--fg-dim); font-size:11px; font-family:var(--font-mono); }
.user-row .logout:hover { color:var(--fg); }

.dot { width:6px; height:6px; border-radius:50%; flex:0 0 6px; }
.dot.ok { background:var(--ok); box-shadow:0 0 0 3px rgba(109,191,122,0.18); }
.dot.warn { background:var(--warn); }
.dot.bad { background:var(--bad); }

/* main */
main {
  min-width:0;
  padding:0 24px 80px;
}
.page-header {
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:18px 0 14px;
  border-bottom:1px solid var(--border-2);
  margin-bottom:16px;
}
.page-title {
  display:flex; align-items:baseline; gap:10px;
}
.page-title h1 { font-size:18px; }
.page-title .crumb { color:var(--fg-dim); font-family:var(--font-mono); font-size:11px; }
.page-header .meta {
  display:flex; align-items:center; gap:14px;
  font-size:11px; color:var(--fg-mute); font-family:var(--font-mono);
}
.page-header .meta .sep { color:var(--fg-faint); }

/* ============================================================
   primitives
   ============================================================ */
.card {
  background:var(--bg-1);
  border:1px solid var(--border);
  border-radius:var(--r-card);
  padding:14px 16px;
  position:relative;
}
.card.tight { padding:10px 12px; }
.card.inset { background:var(--bg-inset); }

.card-head {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
  gap:8px;
}
.card-head .eyebrow { color:var(--fg-mute); }
.card-head .meta { font-family:var(--font-mono); font-size:11px; color:var(--fg-dim); }

.metric-hero {
  font-family:var(--font-mono); font-weight:500; font-variant-numeric:tabular-nums;
  letter-spacing:-0.02em; line-height:1;
}
.metric-hero.sz-56 { font-size:56px; }
.metric-hero.sz-44 { font-size:44px; }
.metric-hero.sz-36 { font-size:36px; }
.metric-hero .unit { font-size:0.4em; color:var(--fg-mute); margin-left:4px; letter-spacing:0; }

.delta {
  display:inline-flex; align-items:center; gap:4px;
  font-family:var(--font-mono); font-size:11px;
  padding:1px 5px; border-radius:2px;
  background:var(--bg-2); color:var(--fg-mute);
}
.delta.up { color:var(--ok); background:var(--ok-12); }
.delta.down { color:var(--bad); background:var(--bad-12); }
.delta.flat { color:var(--fg-mute); }

.chip {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; line-height:1;
  padding:5px 8px;
  border:1px solid var(--border); border-radius:2px;
  color:var(--fg-mute);
  text-transform:uppercase; letter-spacing:0.08em; font-weight:500;
  cursor:pointer; user-select:none; white-space:nowrap;
}
.chip:hover { color:var(--fg); border-color:var(--fg-dim); }
.chip.active { color:var(--accent); border-color:var(--accent-d); background:var(--accent-12); }
.chip .x { color:var(--fg-dim); font-family:var(--font-mono); font-size:10px; }

.btn {
  display:inline-flex; align-items:center; gap:6px;
  height:26px; padding:0 10px;
  border:1px solid var(--border); border-radius:var(--r-ctrl);
  font-size:12px; color:var(--fg);
  background:var(--bg-1);
}
.btn:hover { background:var(--bg-2); border-color:var(--fg-dim); }
.btn.primary { background:var(--accent); color:#062927; border-color:var(--accent); font-weight:500; }
.btn.primary:hover { background:#74d8d1; }
.btn.ghost { background:transparent; border-color:transparent; color:var(--fg-mute); }
.btn.ghost:hover { color:var(--fg); }
.btn .kbd { font-family:var(--font-mono); font-size:10px; color:var(--fg-dim); margin-left:4px; }
.btn[disabled] { opacity:0.5; cursor:not-allowed; }

.input, .select {
  height:30px; padding:0 10px;
  border:1px solid var(--border); border-radius:var(--r-ctrl);
  background:var(--bg-1); color:var(--fg);
  font-size:13px; line-height:1;
  outline:none; transition:border-color 100ms;
}
.input:focus, .select:focus { border-color:var(--accent-d); }
.input::placeholder { color:var(--fg-dim); }
textarea.input { padding:7px 10px; height:auto; min-height:64px; font-family:inherit; resize:vertical; line-height:1.5; }

/* native select chevron */
.select {
  -webkit-appearance:none; -moz-appearance:none; appearance:none;
  padding-right:26px;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--fg-mute) 50%),
    linear-gradient(135deg, var(--fg-mute) 50%, transparent 50%);
  background-position: calc(100% - 12px) 13px, calc(100% - 8px) 13px;
  background-size: 4px 4px, 4px 4px;
  background-repeat:no-repeat;
}
.select:hover { border-color:var(--fg-dim); }

.kvp { display:grid; grid-template-columns:auto 1fr; gap:4px 14px; font-size:12px; }
.kvp dt { color:var(--fg-mute); }
.kvp dd { margin:0; font-family:var(--font-mono); color:var(--fg); }

.divider { height:1px; background:var(--border-2); border:0; margin:14px 0; }

.bar { height:6px; background:var(--bg-2); border-radius:1px; position:relative; overflow:hidden; }
.bar > i { display:block; height:100%; background:var(--accent); }

.tag {
  display:inline-block; padding:1px 5px;
  font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
  border:1px solid var(--border); border-radius:1px;
  color:var(--fg-mute); font-family:var(--font-mono);
}
.tag.peak    { color:var(--accent); border-color:var(--accent-d); background:var(--accent-12); }
.tag.solid   { color:var(--ok); border-color:rgba(109,191,122,0.4); background:var(--ok-12); }
.tag.average { color:var(--warn); border-color:rgba(212,177,90,0.4); background:var(--warn-12); }
.tag.low     { color:var(--warn); border-color:rgba(212,177,90,0.4); background:var(--warn-12); }
.tag.depleted{ color:var(--bad); border-color:rgba(201,106,106,0.4); background:var(--bad-12); }

/* ============================================================
   today dashboard
   ============================================================ */
.grid-today {
  display:grid;
  grid-template-columns: 1.15fr 1fr 1fr 1fr;
  grid-gap:12px;
  align-items:start;
}
.strip {
  margin-top:12px;
  display:grid; grid-template-columns: repeat(5, 1fr); gap:12px;
}
.grid-advisor-row {
  display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;
  margin-top:18px;
}
.grid-bottom-row {
  display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;
  margin-top:18px;
  align-items:start;
}

/* readiness card detail */
.readiness-row { display:flex; align-items:flex-end; gap:14px; }
.readiness-row .num { line-height:0.95; }
.readiness-row .right { display:flex; flex-direction:column; gap:6px; padding-bottom:6px; }
.expl { font-size:12px; color:var(--fg-mute); margin-top:10px; line-height:1.5; }
.expl .mono { color:var(--fg); }

.spark-wrap { margin-top:10px; }
.spark-wrap .label-row { display:flex; justify-content:space-between; font-size:10px; color:var(--fg-dim); margin-top:2px; font-family:var(--font-mono); }

.component-table { width:100%; border-collapse:collapse; margin-top:12px; font-size:12px; }
.component-table th, .component-table td { padding:5px 0; text-align:left; }
.component-table th { color:var(--fg-dim); font-weight:400; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; border-bottom:1px solid var(--border-2); }
.component-table td { color:var(--fg); font-family:var(--font-mono); border-bottom:1px solid var(--border-2); }
.component-table td.k { font-family:var(--font-sans); color:var(--fg-mute); }
.component-table tr:last-child td { border-bottom:0; }
.component-table td.w { color:var(--fg-dim); text-align:right; width:40px; }
.component-table td.v { text-align:right; width:60px; }

.breakdown-toggle {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:12px; padding:6px 0 0;
  border-top:1px solid var(--border-2);
  font-size:11px; color:var(--fg-mute); cursor:pointer;
  font-family:var(--font-mono); letter-spacing:0.04em;
}
.breakdown-toggle:hover { color:var(--fg); }
.breakdown-toggle .chev { font-size:10px; color:var(--fg-dim); transition:transform 120ms; }
.breakdown.open .breakdown-toggle .chev { transform:rotate(180deg); }
.breakdown-body { display:none; }
.breakdown.open .breakdown-body { display:block; }

/* sleep stages */
.stage-bar {
  display:flex; height:8px; width:100%; border-radius:1px; overflow:hidden;
  margin-top:10px;
}
.stage-bar > span { display:block; }
.stage-bar .deep  { background:#5dd0c8; }
.stage-bar .light { background:#3a8a85; }
.stage-bar .rem   { background:#7b9eb5; }
.stage-bar .awake { background:#3a3a42; }
.stage-legend {
  display:grid; grid-template-columns:repeat(4, 1fr); gap:6px;
  margin-top:8px; font-size:10.5px; font-family:var(--font-mono);
}
.stage-legend .it { display:flex; flex-direction:column; gap:2px; }
.stage-legend .it .sw { display:flex; align-items:center; gap:5px; color:var(--fg-mute); text-transform:uppercase; letter-spacing:0.08em; font-size:9.5px; }
.stage-legend .it .sw i { display:block; width:6px; height:6px; }
.stage-legend .it .val { color:var(--fg); }

.bed-wake {
  display:flex; justify-content:space-between;
  margin-top:10px; padding-top:8px; border-top:1px solid var(--border-2);
  font-family:var(--font-mono); font-size:12px;
}
.bed-wake .col { display:flex; flex-direction:column; gap:1px; }
.bed-wake .col .l { font-size:10px; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.08em; font-family:var(--font-mono); }
.bed-wake .col .v { color:var(--fg); }

/* mini sparkline canvas wrapper — MUST use fixed-height container or Chart.js resize-loops */
.spark-box { position:relative; width:100%; height:36px; }
.spark-box.lg { height:52px; }
.spark-box.xl { height:64px; }
.spark-box > canvas { position:absolute; inset:0; width:100% !important; height:100% !important; }

/* advisor */
.advisor-card .head-row { display:flex; align-items:center; justify-content:space-between; }
.advisor-card .intent {
  font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.1em;
  color:var(--fg-mute);
}
.advisor-card .rec {
  font-size:15px; color:var(--fg); margin-top:8px;
  font-family:var(--font-mono); letter-spacing:-0.01em;
}
.advisor-card .rec .when { color:var(--accent); }
.advisor-card .rec .label { color:var(--fg-mute); display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:3px; font-family:var(--font-mono); }
.advisor-card .reasons {
  margin:10px 0 0; padding:0; list-style:none;
  font-size:11.5px; color:var(--fg-mute); line-height:1.6;
}
.advisor-card .reasons li { position:relative; padding-left:10px; }
.advisor-card .reasons li::before { content:"·"; position:absolute; left:2px; color:var(--fg-dim); }

.conf-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
.conf-row .bar { flex:1; height:3px; }
.conf-row .pct { font-family:var(--font-mono); font-size:11px; color:var(--fg-mute); }

.advisor-card .foot {
  margin-top:10px; padding-top:8px; border-top:1px solid var(--border-2);
  font-family:var(--font-mono); font-size:11px; color:var(--fg-dim);
  display:flex; justify-content:space-between;
}
.advisor-card .foot .v { color:var(--fg-mute); }

/* caffeine widget */
.caf {
  margin-top:12px; padding:8px 12px;
  border:1px solid var(--border); border-radius:2px;
  display:flex; align-items:center; gap:14px;
  background:var(--bg-1);
  font-size:12px;
}
.caf .ok { color:var(--ok); font-weight:500; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.08em; font-size:11px; }
.caf .mid { color:var(--warn); font-weight:500; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.08em; font-size:11px; }
.caf .no { color:var(--bad); font-weight:500; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.08em; font-size:11px; }
.caf .sep { color:var(--fg-faint); }
.caf .v { font-family:var(--font-mono); color:var(--fg); }
.caf .k { color:var(--fg-mute); }

/* sidebar (right column) — calendar + recent + quick log */
.col-stack { display:flex; flex-direction:column; gap:12px; }
.cal-list { display:flex; flex-direction:column; }
.cal-row {
  display:grid; grid-template-columns: 60px 1fr auto; gap:10px;
  padding:8px 0; align-items:center;
  border-bottom:1px solid var(--border-2);
  font-size:12px;
}
.cal-row:last-child { border-bottom:0; }
.cal-row .time { font-family:var(--font-mono); color:var(--fg-mute); font-size:11px; }
.cal-row .title { color:var(--fg); }
.cal-row .dur { font-family:var(--font-mono); font-size:11px; color:var(--fg-dim); }
.cal-row.now { background:linear-gradient(90deg, var(--accent-12) 0%, transparent 60%); padding-left:8px; margin-left:-8px; }
.cal-row.now .time { color:var(--accent); }

.entry-feed { display:flex; flex-direction:column; }
.entry-row {
  display:grid; grid-template-columns: 50px 22px 1fr;
  gap:8px; padding:7px 0;
  border-bottom:1px solid var(--border-2);
  font-size:12px; align-items:flex-start;
}
.entry-row:last-child { border-bottom:0; }
.entry-row .t { font-family:var(--font-mono); color:var(--fg-dim); font-size:11px; padding-top:1px; }
.entry-row .ico {
  width:18px; height:18px; display:grid; place-items:center;
  border:1px solid var(--border); border-radius:1px;
  color:var(--fg-mute); font-family:var(--font-mono); font-size:10px; line-height:1;
}
.entry-row .ico.food { color:#caa66d; }
.entry-row .ico.drink { color:#7b9eb5; }
.entry-row .ico.mood { color:var(--accent); }
.entry-row .ico.energy { color:#caa66d; }
.entry-row .ico.focus { color:var(--accent); }
.entry-row .ico.symptom { color:var(--bad); }
.entry-row .ico.note { color:var(--fg-mute); }
.entry-row .ico.workout_manual { color:var(--ok); }
.entry-row .body { display:flex; flex-direction:column; gap:1px; }
.entry-row .body .desc { color:var(--fg); }
.entry-row .body .meta { color:var(--fg-dim); font-family:var(--font-mono); font-size:10.5px; }

.quick-log .row { display:flex; flex-wrap:wrap; gap:6px; }
.quick-log .row .btn { height:26px; padding:0 10px; font-size:11.5px; }
.quick-form {
  margin-top:12px; padding:12px; background:var(--bg-inset);
  border:1px solid var(--border); border-radius:2px;
  display:none; flex-direction:column; gap:8px;
}
.quick-form.open { display:flex; }
.quick-form .qf-row {
  display:grid; grid-template-columns: 80px 1fr;
  align-items:center; gap:10px;
}
.quick-form label { font-size:11px; color:var(--fg-mute); letter-spacing:0.04em; }
.quick-form .input { width:100%; height:28px; font-size:12.5px; }
.quick-form .actions { display:flex; gap:6px; justify-content:flex-end; padding-top:4px; }

/* strip cards */
.strip .card { padding:10px 12px; }
.strip .top {
  display:flex; align-items:baseline; justify-content:space-between; gap:6px;
}
.strip .top .lab { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg-mute); }
.strip .top .delta { background:transparent; padding:0; }
.strip .val { font-family:var(--font-mono); font-size:22px; line-height:1.05; color:var(--fg); }
.strip .val .u { font-size:11px; color:var(--fg-mute); margin-left:2px; }
.strip .spark { height:30px; margin-top:6px; }

/* ============================================================
   trends
   ============================================================ */
.trends-toolbar {
  display:flex; flex-wrap:wrap; align-items:center; gap:8px;
  margin-bottom:12px;
}
.trends-toolbar .group { display:flex; gap:4px; align-items:center; }
.trends-toolbar .group .lab { font-size:10.5px; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.1em; margin-right:6px; }
.chart-wrap {
  border:1px solid var(--border); background:var(--bg-1);
  border-radius:2px; padding:16px;
  height:340px; position:relative;
}
.chart-wrap .chart-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:8px; font-size:11px;
}
.chart-wrap .legend {
  display:flex; gap:14px; font-family:var(--font-mono); font-size:11px;
}
.chart-wrap .legend .it { display:flex; align-items:center; gap:6px; color:var(--fg-mute); }
.chart-wrap .legend .it i { width:14px; height:0; border-top:1.5px solid var(--fg-mute); }
.chart-wrap .legend .it.accent i { border-top-color:var(--accent); border-top-width:1.5px; }
.chart-wrap .legend .it.dash i { border-top-style:dashed; }
.chart-wrap .legend .it.thin i { border-top-width:1px; }
.chart-canvas { position:absolute; left:16px; right:16px; top:42px; bottom:14px; }

.summary-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:12px;
  margin-top:16px;
}
.summary-grid .card { padding:12px; }
.summary-grid .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.summary-grid .name { font-size:12px; color:var(--fg-mute); }
.summary-grid .now { font-family:var(--font-mono); font-size:18px; color:var(--fg); }
.summary-grid .kvp { font-size:11.5px; }

.heatmap-wrap { margin-top:16px; }
.heatmap-wrap .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.heatmap-grid { display:grid; grid-template-rows: repeat(7, 14px); grid-auto-flow:column; grid-auto-columns: 14px; gap:2px; }
.heatmap-grid .cell {
  background:var(--bg-2);
  border:1px solid transparent;
  border-radius:1px;
}
.heatmap-grid .cell[data-v="1"] { background:rgba(93,208,200,0.15); }
.heatmap-grid .cell[data-v="2"] { background:rgba(93,208,200,0.30); }
.heatmap-grid .cell[data-v="3"] { background:rgba(93,208,200,0.55); }
.heatmap-grid .cell[data-v="4"] { background:rgba(93,208,200,0.85); }
.heatmap-legend { display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10.5px; color:var(--fg-dim); }
.heatmap-legend .swatches { display:flex; gap:2px; }
.heatmap-legend .sw { width:12px; height:12px; background:var(--bg-2); }

/* ============================================================
   log browser
   ============================================================ */
.log-toolbar {
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  margin-bottom:12px;
}
.log-toolbar .search { flex:1; min-width:260px; }
.search-wrap { position:relative; }
.search-wrap .input { width:100%; padding-left:28px; }
.search-wrap::before { content:"⌕"; position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--fg-dim); font-family:var(--font-mono); }
.log-table { width:100%; border-collapse:collapse; font-size:13px; }
.log-table th {
  text-align:left; font-weight:500; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--fg-dim); padding:8px 12px; border-bottom:1px solid var(--border);
  background:var(--bg-0); position:sticky; top:0;
}
.log-table td { padding:9px 12px; border-bottom:1px solid var(--border-2); vertical-align:top; }
.log-table tr:hover td { background:var(--bg-1); }
.log-table td.t { font-family:var(--font-mono); color:var(--fg-mute); font-size:11.5px; width:140px; }
.log-table td.type { width:120px; }
.log-table td.type .pill {
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em;
  color:var(--fg-mute);
}
.log-table td.type .pill i {
  display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--fg-dim);
}
.log-table td.type .pill.food i { background:#caa66d; }
.log-table td.type .pill.drink i { background:#7b9eb5; }
.log-table td.type .pill.mood i { background:var(--accent); }
.log-table td.type .pill.energy i { background:#caa66d; }
.log-table td.type .pill.focus i { background:var(--accent); }
.log-table td.type .pill.symptom i { background:var(--bad); }
.log-table td.type .pill.note i { background:var(--fg-mute); }
.log-table td.type .pill.workout_manual i { background:var(--ok); }
.log-table td.summary { color:var(--fg); }
.log-table td.summary .sub { display:block; color:var(--fg-dim); font-size:11px; margin-top:2px; font-family:var(--font-mono); }
.log-table td.act { width:80px; text-align:right; }
.log-table td.act .btn { height:22px; padding:0 7px; font-size:11px; }
.log-table td.act .btn.ghost { color:var(--fg-dim); }

.pagination {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 12px; font-size:12px; color:var(--fg-mute);
}
.pagination .pages { display:flex; gap:4px; }
.pagination .pages .btn { height:24px; padding:0 8px; font-size:11.5px; }

.add-entry {
  margin:12px 0; padding:14px; background:var(--bg-1);
  border:1px solid var(--border); border-radius:2px;
  display:none; flex-direction:column; gap:12px;
}
.add-entry.open { display:flex; }
.add-entry .row { display:grid; grid-template-columns:140px 1fr; gap:14px; align-items:center; }
.add-entry .row label { font-size:11.5px; color:var(--fg-mute); }
.add-entry .actions { display:flex; gap:8px; justify-content:flex-end; }
.add-entry .field-set { display:flex; gap:8px; flex-wrap:wrap; }

/* ============================================================
   habits
   ============================================================ */
.habits-list { display:flex; flex-direction:column; gap:12px; }
.habit-card {
  background:var(--bg-1); border:1px solid var(--border); border-radius:2px;
  padding:14px 16px;
}
.habit-head { display:grid; grid-template-columns: 1.5fr 0.7fr 0.7fr 0.7fr auto; gap:14px; align-items:center; }
.habit-head .nm { font-size:14px; color:var(--fg); font-weight:500; }
.habit-head .nm .sub { display:block; font-size:11px; color:var(--fg-dim); font-weight:400; font-family:var(--font-mono); margin-top:2px; }
.habit-head .stat { display:flex; flex-direction:column; gap:2px; }
.habit-head .stat .l { font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-dim); }
.habit-head .stat .v { font-family:var(--font-mono); font-size:14px; color:var(--fg); }
.habit-head .stat .v .acc { color:var(--accent); }

.check {
  width:30px; height:30px; border:1px solid var(--border); border-radius:2px;
  background:var(--bg-2); display:grid; place-items:center;
  font-family:var(--font-mono); color:var(--fg-dim);
  cursor:pointer;
}
.check.done { background:var(--accent-12); border-color:var(--accent-d); color:var(--accent); }
.check:hover { border-color:var(--fg-dim); }

.habit-cal {
  margin-top:14px; display:grid; grid-template-columns:repeat(30, 1fr); gap:3px;
}
.habit-cell {
  height:14px; background:var(--bg-2); border-radius:1px;
}
.habit-cell.done { background:var(--accent); }
.habit-cell.done.dim { background:var(--accent-d); }
.habit-cell.miss { background:var(--bg-2); border:1px solid var(--border); }
.habit-cell.future { background:transparent; border:1px dashed var(--border-2); }

.habit-foot {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:8px; font-family:var(--font-mono); font-size:10.5px; color:var(--fg-dim);
}
.habit-foot .actions { display:flex; gap:8px; }
.habit-foot .actions .btn { height:22px; padding:0 8px; font-size:11px; }

/* ============================================================
   weekly report
   ============================================================ */
.report-head {
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-bottom:14px;
}
.report-head .left .wk { font-family:var(--font-mono); font-size:11px; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.08em; }
.report-head .left h1 { font-size:22px; margin-top:4px; }
.report-head .left .gen { font-family:var(--font-mono); font-size:11px; color:var(--fg-dim); margin-top:4px; }
.report-summary {
  font-size:15px; color:var(--fg); line-height:1.55;
  padding:16px 18px; background:var(--bg-1); border:1px solid var(--border); border-radius:2px;
  border-left:2px solid var(--accent);
}
.report-grid {
  display:grid; grid-template-columns:repeat(4, 1fr); gap:12px;
  margin-top:16px;
}
.report-grid .card .name { font-size:11px; color:var(--fg-mute); text-transform:uppercase; letter-spacing:0.08em; }
.report-grid .card .v { font-family:var(--font-mono); font-size:26px; color:var(--fg); margin-top:6px; line-height:1; }
.report-grid .card .v .u { font-size:11px; color:var(--fg-mute); margin-left:3px; }
.report-grid .card .d { margin-top:6px; }

.best-worst { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:16px; }
.best-worst .card .head-row { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
.best-worst .card .lab { font-family:var(--font-mono); font-size:11px; color:var(--fg-mute); letter-spacing:0.08em; text-transform:uppercase; }
.best-worst .card.best .lab { color:var(--ok); }
.best-worst .card.worst .lab { color:var(--bad); }
.best-worst .card .date { font-family:var(--font-mono); font-size:18px; color:var(--fg); }
.best-worst .card .why { font-size:12.5px; color:var(--fg-mute); line-height:1.55; margin-top:8px; }
.best-worst .card .stats { display:flex; gap:14px; margin-top:10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-mute); }
.best-worst .card .stats .k { color:var(--fg-dim); }

.patterns { margin-top:16px; }
.patterns ul { margin:10px 0 0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px; }
.patterns li {
  padding:8px 12px; background:var(--bg-1); border:1px solid var(--border-2); border-radius:2px;
  font-size:12.5px; color:var(--fg); line-height:1.5;
  display:grid; grid-template-columns: 80px 1fr; gap:14px; align-items:baseline;
}
.patterns li .tag-r {
  font-family:var(--font-mono); font-size:10.5px; color:var(--fg-mute);
  text-transform:uppercase; letter-spacing:0.08em;
}
.patterns li .tag-r.up { color:var(--ok); }
.patterns li .tag-r.dn { color:var(--bad); }

.experiment {
  margin-top:16px; padding:14px 16px;
  background:var(--bg-1); border:1px solid var(--accent-d);
  border-left:2px solid var(--accent);
  border-radius:2px;
}
.experiment .lab { font-family:var(--font-mono); font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; }
.experiment .txt { font-size:14px; color:var(--fg); margin-top:6px; line-height:1.55; }

/* ============================================================
   login
   ============================================================ */
.login-page {
  min-height:100vh; display:grid; place-items:center;
  background:var(--bg-0);
}
.login-page .box {
  width:300px; padding:28px 26px;
  background:var(--bg-1); border:1px solid var(--border);
  border-radius:2px;
}
.login-page .brand-block {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  margin-bottom:22px;
}
.login-page .brand-block .mark { width:22px; height:22px; position:relative; }
.login-page .brand-block .mark::before, .login-page .brand-block .mark::after { content:""; position:absolute; inset:0; border:1px solid var(--accent); }
.login-page .brand-block .mark::after { transform:rotate(45deg) scale(0.7); }
.login-page .brand-block .nm { font-family:var(--font-mono); font-size:16px; letter-spacing:0.06em; }
.login-page .brand-block .sub { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.1em; }
.login-page form { display:flex; flex-direction:column; gap:10px; }
.login-page .err {
  display:none; padding:6px 10px; border-radius:2px;
  background:var(--bad-12); color:var(--bad);
  font-family:var(--font-mono); font-size:11px;
  border:1px solid rgba(201,106,106,0.3);
}
.login-page .err.on { display:block; }
.login-page .submit { width:100%; height:32px; justify-content:center; }
.login-page .foot { margin-top:18px; text-align:center; font-family:var(--font-mono); font-size:10.5px; color:var(--fg-dim); }

/* ============================================================
   page switching
   ============================================================ */
.page { display:none; }
.page.active { display:block; }

/* ============================================================
   states gallery
   ============================================================ */
.states-page { padding-top:6px; }
.states-page h2 { margin:24px 0 10px; }
.states-page .group {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:14px;
}
.states-page .anno {
  font-family:var(--font-mono); font-size:10.5px; color:var(--fg-dim);
  text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;
}

/* skeletons */
.sk {
  background:linear-gradient(90deg, var(--bg-2) 0%, #1d1d23 50%, var(--bg-2) 100%);
  background-size:200% 100%;
  animation:sk 1.2s linear infinite;
  border-radius:2px;
}
@keyframes sk { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
.sk.line { height:10px; }
.sk.line.sm { height:8px; }
.sk.num { height:36px; width:120px; }
.sk.block { height:80px; }
.sk-row { display:flex; flex-direction:column; gap:8px; }

.empty {
  padding:24px 20px; text-align:center;
  border:1px dashed var(--border); border-radius:2px;
  background:var(--bg-inset);
  display:flex; flex-direction:column; gap:8px; align-items:center;
}
.empty .ico {
  width:24px; height:24px; border:1px dashed var(--fg-dim);
  display:grid; place-items:center; color:var(--fg-dim);
  font-family:var(--font-mono); font-size:12px;
}
.empty .ti { font-size:13px; color:var(--fg); }
.empty .sub { font-size:11.5px; color:var(--fg-mute); max-width:240px; line-height:1.5; }

.err-banner {
  padding:10px 12px; border:1px solid rgba(201,106,106,0.3); border-left:2px solid var(--bad);
  border-radius:2px; background:var(--bad-12);
  display:flex; gap:10px; align-items:flex-start;
  font-size:12.5px;
}
.err-banner .ti { color:var(--bad); font-weight:500; font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
.err-banner .body { color:var(--fg-mute); line-height:1.5; margin-top:2px; }
.err-banner .actions { margin-left:auto; }

/* ============================================================
   small bits
   ============================================================ */
.crumb-bar {
  display:flex; gap:6px; font-family:var(--font-mono); font-size:10.5px; color:var(--fg-dim);
  text-transform:uppercase; letter-spacing:0.08em;
  margin-bottom:4px;
}
.crumb-bar .sep { color:var(--fg-faint); }
.endpoint {
  font-family:var(--font-mono); font-size:10px; color:var(--fg-faint);
  letter-spacing:0;
}
.row-flex { display:flex; align-items:center; gap:10px; }
.row-flex.between { justify-content:space-between; }
.gap-2 { gap:8px; } .gap-3 { gap:12px; } .gap-4 { gap:16px; }
.mt-2 { margin-top:8px; } .mt-3 { margin-top:12px; } .mt-4 { margin-top:16px; }

.kbd-shortcut {
  font-family:var(--font-mono); font-size:10px; color:var(--fg-dim);
  border:1px solid var(--border); padding:1px 4px; border-radius:2px;
}

/* ============================================================
   tweaks — accent palettes, theme, density
   ============================================================ */
body[data-accent="amber"]  { --accent:#e0a96d; --accent-d:#9c7142; --accent-12:rgba(224,169,109,0.14); --accent-20:rgba(224,169,109,0.22); }
body[data-accent="violet"] { --accent:#b69df0; --accent-d:#6f5aa8; --accent-12:rgba(182,157,240,0.14); --accent-20:rgba(182,157,240,0.22); }
body[data-accent="lime"]   { --accent:#b3d96d; --accent-d:#6a8a3a; --accent-12:rgba(179,217,109,0.14); --accent-20:rgba(179,217,109,0.22); }

/* sleep-stage deep block follows accent */
body[data-accent="amber"]  .stage-bar .deep { background:#e0a96d; }
body[data-accent="amber"]  .stage-bar .light { background:#9c7142; }
body[data-accent="violet"] .stage-bar .deep { background:#b69df0; }
body[data-accent="violet"] .stage-bar .light { background:#6f5aa8; }
body[data-accent="lime"]   .stage-bar .deep { background:#b3d96d; }
body[data-accent="lime"]   .stage-bar .light { background:#6a8a3a; }

/* density */
body[data-density="compact"] { font-size:12px; }
body[data-density="compact"] .card { padding:10px 12px; }
body[data-density="compact"] .grid-today { grid-gap:8px; }
body[data-density="compact"] .strip { gap:8px; }
body[data-density="compact"] .grid-advisor-row { gap:8px; margin-top:14px; }
body[data-density="compact"] .grid-bottom-row { gap:8px; margin-top:14px; }
body[data-density="compact"] .metric-hero.sz-56 { font-size:44px; }
body[data-density="compact"] .metric-hero.sz-44 { font-size:34px; }
body[data-density="compact"] .strip .val { font-size:18px; }
body[data-density="compact"] main { padding:0 18px 60px; }

body[data-density="roomy"] { font-size:13.5px; }
body[data-density="roomy"] .card { padding:18px 20px; }
body[data-density="roomy"] .grid-today { grid-gap:16px; }
body[data-density="roomy"] .strip { gap:16px; }
body[data-density="roomy"] .grid-advisor-row { gap:16px; margin-top:24px; }
body[data-density="roomy"] .grid-bottom-row { gap:16px; margin-top:24px; }
body[data-density="roomy"] .metric-hero.sz-56 { font-size:64px; }
body[data-density="roomy"] .metric-hero.sz-44 { font-size:50px; }
body[data-density="roomy"] .strip .val { font-size:26px; }
body[data-density="roomy"] main { padding:0 32px 100px; }

/* ============================================================
   originality touches
   ============================================================ */
/* subtle scanline grid on the page bg — operator console feel */
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at top, black 30%, transparent 80%);
}
[data-theme="light"] body::before {
  background-image:
    linear-gradient(to right, rgba(0,0,0,0.025) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.025) 1px, transparent 1px);
}
.app, .login-page { position:relative; z-index:1; }

/* pulse on the live "now" indicator dot */
@keyframes pulseDot {
  0%,100% { box-shadow:0 0 0 0 rgba(93,208,200,0.40); }
  50%     { box-shadow:0 0 0 4px rgba(93,208,200,0.00); }
}
.dot.ok { animation: pulseDot 2.4s ease-in-out infinite; }

/* card hover */

[data-theme="light"] .card:hover { border-color:#bcbcb6; }

/* readiness radial ring */
.readiness-ring {
  position:relative; width:104px; height:104px; flex:0 0 104px;
}
.readiness-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
.readiness-ring .track { stroke:var(--bg-2); fill:none; }
.readiness-ring .arc {
  stroke:var(--accent); fill:none; stroke-linecap:round;
  transition: stroke-dashoffset 800ms cubic-bezier(.2,.7,.2,1);
  filter: drop-shadow(0 0 6px rgba(93,208,200,0.15));
}
body[data-accent="amber"]  .readiness-ring .arc { filter: drop-shadow(0 0 6px rgba(224,169,109,0.18)); }
body[data-accent="violet"] .readiness-ring .arc { filter: drop-shadow(0 0 6px rgba(182,157,240,0.18)); }
body[data-accent="lime"]   .readiness-ring .arc { filter: drop-shadow(0 0 6px rgba(179,217,109,0.18)); }
.readiness-ring .num {
  position:absolute; inset:0; display:grid; place-items:center;
  font-family:var(--font-mono); font-size:34px; font-weight:500;
  color:var(--fg); letter-spacing:-0.02em; line-height:1;
}

/* ============================================================
   animations — page + card stagger + count-up
   ============================================================ */
@keyframes pageFade {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.page.active { animation: pageFade 220ms cubic-bezier(.2,.7,.2,1) both; }
.page.active .card,
.page.active .err-banner,
.page.active .report-summary,
.page.active .experiment {
  animation: cardIn 320ms cubic-bezier(.2,.7,.2,1) both;
}
/* stagger via :nth-child up to 12 */
.page.active .card:nth-child(1) { animation-delay: 0ms; }
.page.active .card:nth-child(2) { animation-delay: 30ms; }
.page.active .card:nth-child(3) { animation-delay: 60ms; }
.page.active .card:nth-child(4) { animation-delay: 90ms; }
.page.active .card:nth-child(5) { animation-delay: 120ms; }
.page.active .card:nth-child(6) { animation-delay: 150ms; }
.page.active .card:nth-child(7) { animation-delay: 180ms; }
.page.active .card:nth-child(8) { animation-delay: 210ms; }

/* shimmer-in for spark areas */
@keyframes lineDraw {
  from { stroke-dashoffset: 100%; }
  to   { stroke-dashoffset: 0; }
}

/* prefers-reduced-motion: kill all entrance and pulse animation */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation:none !important; transition:none !important; }
}

/* ---------- TRENDS ---------- */
function tplTrends(){
  const metrics = [
    { k:'sleep_score',       lab:'sleep_score',       on:true },
    { k:'hrv_overnight_avg', lab:'hrv_overnight_avg', on:true },
    { k:'resting_hr',        lab:'resting_hr',        on:false },
    { k:'stress_avg',        lab:'stress_avg',        on:false },
    { k:'readiness_score',   lab:'readiness_score',   on:true },
    { k:'body_battery_start',lab:'body_battery_start',on:false },
  ];
  const summary = (k) => {
    const arr = series[k].slice(-14);
    const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
    const sd = Math.sqrt(arr.reduce((a,b)=>a+(b-mean)**2,0)/arr.length);
    return { mean: mean.toFixed(1), sd: sd.toFixed(1), min: Math.min(...arr).toFixed(0), max: Math.max(...arr).toFixed(0), cur: arr[arr.length-1] };
  };

  // Calendar load heatmap (7 rows x ~30 cols)
  const heat = DATES_30.map((d,i)=>{
    const seed = (i*37+13) % 7;
    return { d, v: seed<2?0: seed<4?1: seed<5?2: seed<6?3:4 };
  });

  return `
  <div class="page-header">
    <div class="page-title">
      <h1>Trends</h1>
      <span class="crumb">14d window · ending 2026-05-13</span>
    </div>
    <div class="meta">
      <span class="endpoint">GET /metrics?name=&from=&to=</span>
    </div>
  </div>

  <div class="trends-toolbar">
    <div class="group">
      <span class="lab">Period</span>
      <span class="chip">14d <span class="x">✓</span></span>
      <span class="chip active">14d</span>
      <span class="chip">30d</span>
    </div>
    <div style="width:1px; height:18px; background:var(--border); margin:0 6px;"></div>
    <div class="group" style="flex-wrap:wrap;">
      <span class="lab">Metrics</span>
      ${metrics.map(m => `<span class="chip${m.on?' active':''}" data-metric="${m.k}">${m.lab}</span>`).join('')}
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-header">
      <div class="legend">
        <span class="it accent"><i></i>readiness_score</span>
        <span class="it"><i></i>sleep_score</span>
        <span class="it thin dash"><i></i>hrv_overnight_avg</span>
      </div>
      <div class="mono dim" style="font-size:10.5px;">y-axis: 0-100 (left) · ms (right)</div>
    </div>
    <div class="chart-canvas"><canvas id="trends-chart"></canvas></div>
  </div>

  <div class="summary-grid">
    ${[
      { k:'sleep_score', lab:'sleep_score', u:'/100' },
      { k:'hrv_overnight_avg', lab:'hrv_overnight_avg', u:'ms' },
      { k:'readiness_score', lab:'readiness_score', u:'/100' },
    ].map(m => { const s = summary(m.k); return `
      <div class="card">
        <div class="head">
          <span class="name">${m.lab}</span>
          <span class="now mono">${s.cur}<span class="u" style="font-size:11px; color:var(--fg-mute);">${m.u}</span></span>
        </div>
        <dl class="kvp">
          <dt>mean (14d)</dt><dd>${s.mean}</dd>
          <dt>sd</dt><dd>${s.sd}</dd>
          <dt>min</dt><dd>${s.min}</dd>
          <dt>max</dt><dd>${s.max}</dd>
        </dl>
      </div>`}).join('')}
  </div>

  <div class="heatmap-wrap">
    <div class="head">
      <div>
        <div class="eyebrow">Calendar load · 30d</div>
        <div class="dim mono" style="font-size:11px; margin-top:4px;">meeting hours per day · count of events</div>
      </div>
      <div class="heatmap-legend">
        <span>less</span>
        <div class="swatches">
          <div class="sw" data-v="0"></div>
          <div class="sw" data-v="1" style="background:rgba(93,208,200,0.15);"></div>
          <div class="sw" data-v="2" style="background:rgba(93,208,200,0.30);"></div>
          <div class="sw" data-v="3" style="background:rgba(93,208,200,0.55);"></div>
          <div class="sw" data-v="4" style="background:rgba(93,208,200,0.85);"></div>
        </div>
        <span>more</span>
      </div>
    </div>
    <div class="heatmap-grid">
      ${heat.map(c => `<div class="cell" data-v="${c.v}" title="${c.d}"></div>`).join('')}
    </div>
  </div>
  `;
}

<script>
/* ============================================================
   ROUTER + CHART INIT
   ============================================================ */
const PAGE_TPL = {
  today: tplToday, trends: tplTrends, log: tplLog,
  habits: tplHabits, report: tplReport, states: tplStates,
  'login-demo': tplLoginDemo,
};

function switchPage(name){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === name));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + name);
  if (!el) return;
  el.innerHTML = PAGE_TPL[name] ? PAGE_TPL[name]() : '';
  el.classList.add('active');
  // Render charts as needed
  setTimeout(() => renderChartsFor(name), 0);
  window.scrollTo(0,0);
}
window.switchPage = switchPage;

document.getElementById('nav').addEventListener('click', (e) => {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  switchPage(item.dataset.page);
});

// keyboard accelerators
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input,textarea,select')) return;
  const map = { t:'today', r:'trends', l:'log', h:'habits', w:'report', s:'states' };
  if (map[e.key]) switchPage(map[e.key]);
});

/* ===== Chart.js global defaults ===== */
function applyChartDefaults(){
  if (!window.Chart) return;
  const css = getComputedStyle(document.body);
  const fg = css.getPropertyValue('--fg').trim();
  const mute = css.getPropertyValue('--fg-mute').trim();
  const dim = css.getPropertyValue('--fg-dim').trim();
  const faint = css.getPropertyValue('--fg-faint').trim();
  Chart.defaults.color = mute;
  Chart.defaults.font.family = "'Inter','Helvetica Neue',Arial,sans-serif";
  Chart.defaults.font.size = 11;
  Chart.defaults.borderColor = faint;
  Chart.defaults.elements.line.borderWidth = 1.2;
  Chart.defaults.elements.line.tension = 0.25;
  Chart.defaults.elements.point.radius = 0;
  Chart.defaults.elements.point.hoverRadius = 3;
  Chart.defaults.plugins.legend.display = false;
  Chart.defaults.plugins.tooltip.backgroundColor = '#0a0a0b';
  Chart.defaults.plugins.tooltip.borderColor = '#24242b';
  Chart.defaults.plugins.tooltip.borderWidth = 1;
  Chart.defaults.plugins.tooltip.titleColor = fg;
  Chart.defaults.plugins.tooltip.bodyColor = mute;
  Chart.defaults.plugins.tooltip.titleFont = { family:"'JetBrains Mono',monospace", size:11 };
  Chart.defaults.plugins.tooltip.bodyFont  = { family:"'JetBrains Mono',monospace", size:11 };
  Chart.defaults.plugins.tooltip.padding = 8;
  Chart.defaults.plugins.tooltip.cornerRadius = 2;
}

function spark(canvasId, data, opts={}){
  const ctx = document.getElementById(canvasId); if (!ctx) return;
  const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim();
  const muted = getComputedStyle(document.body).getPropertyValue('--fg-mute').trim();
  return new Chart(ctx, {
    type:'line',
    data:{
      labels: data.map((_,i)=>i),
      datasets:[{
        data,
        borderColor: opts.accent ? accent : muted,
        borderWidth: opts.thin ? 1 : 1.3,
        fill: opts.fill ? {
          target:'origin',
          above: opts.accent ? 'rgba(93,208,200,0.10)' : 'rgba(154,154,163,0.08)',
        } : false,
        pointRadius: 0,
        pointHoverRadius: 2,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      animation: { duration: 500, easing: 'easeOutCubic' },
      scales:{
        x:{ display:false }, y:{ display:false, grace:'10%' }
      },
      plugins:{ legend:{display:false}, tooltip:{ enabled: !!opts.tooltip } }
    }
  });
}

function renderChartsFor(page){
  applyChartDefaults();
  if (page === 'today'){
    spark('spark-readiness', series.readiness_score.slice(-7), { accent:true, fill:true });
    spark('spark-hrv',       series.hrv_overnight_avg.slice(-14), { accent:true, fill:true });
    spark('spark-bb',        BB.curve.map(p=>p.v), { accent:true, fill:true });
    spark('s-hrv',           series.hrv_overnight_avg.slice(-7));
    spark('s-sleep',         series.sleep_score.slice(-7));
    spark('s-rhr',           series.resting_hr.slice(-7));
    spark('s-str',           series.stress_avg.slice(-7));
    spark('s-rd',            series.readiness_score.slice(-7), { accent:true });
  }
  if (page === 'trends'){
    const ctx = document.getElementById('trends-chart'); if (!ctx) return;
    const labels = DATES_30.slice(-14).map(d=>d.slice(5));
    const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim();
    const mute = getComputedStyle(document.body).getPropertyValue('--fg-mute').trim();
    const dim  = getComputedStyle(document.body).getPropertyValue('--fg-dim').trim();
    const faint= getComputedStyle(document.body).getPropertyValue('--fg-faint').trim();
    new Chart(ctx, {
      type:'line',
      data:{
        labels,
        datasets:[
          { label:'readiness_score', data: series.readiness_score.slice(-14), borderColor:accent, borderWidth:1.8, yAxisID:'y' },
          { label:'sleep_score',     data: series.sleep_score.slice(-14),     borderColor:mute,   borderWidth:1.2, yAxisID:'y' },
          { label:'hrv_overnight_avg', data: series.hrv_overnight_avg.slice(-14), borderColor:dim, borderWidth:1, borderDash:[3,3], yAxisID:'y1' },
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false, animation: { duration: 700, easing: 'easeOutCubic' },
        interaction:{ mode:'index', intersect:false },
        scales:{
          x:{ grid:{ color:faint, drawTicks:false, drawBorder:false }, ticks:{ color:dim, maxRotation:0, font:{ family:"'JetBrains Mono',monospace", size:10 }, autoSkipPadding:24 } },
          y:{ position:'left', grid:{ color:faint, drawBorder:false }, ticks:{ color:dim, font:{ family:"'JetBrains Mono',monospace", size:10 } }, min:0, max:100 },
          y1:{ position:'right', grid:{ display:false }, ticks:{ color:dim, font:{ family:"'JetBrains Mono',monospace", size:10 } }, min:30, max:80 },
        },
      }
    });
  }
}

<script>
/* ============================================================
   TWEAKS — vanilla, follows host protocol
   ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "teal",
  "density": "compact"
}/*EDITMODE-END*/;

const tweakState = { ...TWEAK_DEFAULTS };

function applyTweaks(){
  document.documentElement.setAttribute('data-theme', tweakState.theme);
  document.body.setAttribute('data-accent', tweakState.accent);
  document.body.setAttribute('data-density', tweakState.density);
  // sync segmented controls
  document.querySelectorAll('.tw-seg').forEach(seg => {
    const key = seg.dataset.tweak;
    seg.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.v === tweakState[key]));
  });
  document.querySelectorAll('.tw-swatches').forEach(sw => {
    const key = sw.dataset.tweak;
    sw.querySelectorAll('.tw-sw').forEach(b => b.classList.toggle('on', b.dataset.v === tweakState[key]));
  });
}
function setTweak(key, value){
  tweakState[key] = value;
  applyTweaks();
  // persist via host
  try {
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: { [key]: value } }, '*');
  } catch(e){}
  // re-render current page so charts pick up new theme colors
  const active = document.querySelector('.nav-item.active');
  if (active) switchPage(active.dataset.page);
}

// click handlers
document.querySelectorAll('.tw-seg, .tw-swatches').forEach(group => {
  group.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-v]');
    if (!btn) return;
    setTweak(group.dataset.tweak, btn.dataset.v);
  });
});

const tweaksPanel = document.getElementById('tweaks-panel');
const tweaksFab   = document.getElementById('tweaks-fab');
function openTweaks(){ tweaksPanel.classList.add('open'); tweaksFab.classList.add('hidden'); }
function closeTweaks(){
  tweaksPanel.classList.remove('open');
  tweaksFab.classList.remove('hidden');
  try { window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); } catch(e){}
}
tweaksFab.addEventListener('click', openTweaks);
document.getElementById('tweaks-close').addEventListener('click', closeTweaks);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && tweaksPanel.classList.contains('open')) closeTweaks(); });

// host protocol: register listener BEFORE announcing availability
window.addEventListener('message', (ev) => {
  const d = ev.data || {};
  if (d.type === '__activate_edit_mode')   openTweaks();
  if (d.type === '__deactivate_edit_mode') closeTweaks();
});
try { window.parent.postMessage({ type:'__edit_mode_available' }, '*'); } catch(e){}
// also show local FAB as fallback so the panel is reachable without the host toolbar
tweaksFab.classList.remove('hidden');

applyTweaks();
</script>

<script>
/* ============================================================
   NUMBER COUNT-UP + READINESS RING — runs after each render
   ============================================================ */
function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }
function countUp(el, to, dur=700, suffix=''){
  if (!el) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches){ el.textContent = to + suffix; return; }
  const start = performance.now();
  function step(t){
    const k = Math.min(1, (t-start)/dur);
    el.textContent = Math.round(to * easeOutCubic(k)) + suffix;
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  setTimeout(()=>{ el.textContent = to + suffix; }, dur + 20); // rAF fallback in sandboxed iframes
}
function animateReadinessRing(){
  const arc = document.getElementById('readiness-arc');
  const num = document.getElementById('readiness-num');
  if (!arc || !num) return;
  const target = F1.score;
  const circ = Math.PI * 2 * 46;
  const offset = circ * (1 - target/100);
  arc.setAttribute('stroke-dashoffset', circ);
  num.textContent = '0';
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    arc.setAttribute('stroke-dashoffset', offset);
    num.textContent = target;
    return;
  }
  setTimeout(() => { arc.setAttribute('stroke-dashoffset', offset); }, 80);
  countUp(num, target, 800);
}

// patch switchPage to trigger reveal animations after each render
const _origSwitchPage = window.switchPage;
window.switchPage = function(name){
  _origSwitchPage(name);
  setTimeout(() => {
    if (name === 'today') animateReadinessRing();
  }, 60);
};
// trigger on initial boot
setTimeout(animateReadinessRing, 80);
</script>
